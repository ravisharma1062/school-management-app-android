name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v4

      - uses: gradle/actions/setup-gradle@v6

      - name: Run JVM unit tests
        run: ./gradlew test

      # Debug builds use default debug signing automatically, so the missing release-signing
      # config (a separate known gap) doesn't block this — it's just a compile/assemble check.
      - name: Assemble debug APK
        run: ./gradlew assembleDebug
